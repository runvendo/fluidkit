name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      # Use `npx size-limit` directly instead of `npm run size` (which runs
      # `build && size-limit`) — the build step above already produced dist/,
      # so re-running it here would be redundant.
      - run: npx size-limit
      - run: npm run check:gpu-leak
      - run: npm run check:pack
